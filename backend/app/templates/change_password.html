<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGMIS - Secure Password Change</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">Security</h1>
            <p class="login-subtitle">Mandatory First-Login Password Change</p>
            
            <div style="background: rgba(34, 211, 238, 0.05); border: 1px solid rgba(34, 211, 238, 0.2); padding: 15px; border-radius: 12px; margin-bottom: 30px; text-align: left;">
                <p style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--cyan); margin: 0;">USER: {{ username }}</p>
                <p style="font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-muted); margin-top: 5px;">Your account requires a permanent password update before proceeding to the dashboard.</p>
            </div>

            <form action="/change-password" method="post" class="login-form">
                <input
                    id="new_password"
                    name="new_password"
                    type="password"
                    placeholder="New Secure PIN / Password"
                    class="input-field"
                    required
                    autofocus
                >
                <input
                    id="confirm_password"
                    type="password"
                    placeholder="Confirm New Password"
                    class="input-field"
                    required
                >
                <button type="submit" class="btn-login" id="submitBtn">Update & Secure Account</button>
            </form>
            
            <p id="errorMsg" style="color: var(--danger); font-family: var(--font-mono); font-size: 0.7rem; margin-top: 20px; display: none;">Passwords do not match. Integrity check failed.</p>
        </div>
    </div>

    <script>
        const form = document.querySelector('form');
        const pass = document.getElementById('new_password');
        const confirm = document.getElementById('confirm_password');
        const error = document.getElementById('errorMsg');

        form.onsubmit = (e) => {
            if (pass.value !== confirm.value) {
                e.preventDefault();
                error.style.display = 'block';
                return false;
            }
        };
    </script>
</body>
</html>

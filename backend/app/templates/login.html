<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGMIS Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">AGMIS DOSSIER</h1>
            <p class="login-subtitle">Academic Guidance Motivation & Intelligence System</p>
            <p
                style="font-family: 'Courier New', Courier, monospace; color: #B22222; font-weight: bold; margin-bottom: 20px;">
                RESTRICTED ACCESS ONLY.</p>

            {% if error %}
            <div class="login-error" role="alert"
                style="background: rgba(178, 34, 34, 0.1); border: 1px solid #B22222; color: #B22222; padding: 10px; font-family: 'Courier New', monospace; font-weight: bold; margin-bottom: 20px;">
                ACCESS DENIED. INCORRECT CREDENTIALS.
            </div>
            {% endif %}

            <form action="/login" method="post" class="login-form" id="loginForm">
                <input id="username" name="username" type="text" placeholder="IDENTIFIERCODE (Student/Faculty)"
                    class="input-field" required autocomplete="username" autofocus>
                <input id="password" name="password" type="password" placeholder="SECURITY PIN" class="input-field"
                    required autocomplete="current-password">
                <button type="submit" class="btn-login">AUTHORIZE ACCESS</button>
            </form>
        </div>
    </div>
</body>

</html>
